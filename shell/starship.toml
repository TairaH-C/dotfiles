format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$php\
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'

[character]
success_symbol = "[>](green)"
error_symbol = "[>](red)"

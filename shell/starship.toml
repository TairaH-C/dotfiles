format = """
$container\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$php\
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'

[hostname]
ssh_only = false
format = "[$hostname]($style) "
style = "bold yellow"

[container]
format = "[$symbol$name]($style) "
style = "bold blue"

[character]
success_symbol = "[>](green)"
error_symbol = "[>](red)"

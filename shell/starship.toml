"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 35
command_timeout = 700

palette = "gruvbox_dark"

format = """
[Óā≤](fg:bg3)\
$username\
$hostname\
[Óāį](bg:yellow fg:bg3)\
$directory\
[Óāį](bg:aqua fg:yellow)\
$git_branch\
$git_status\
[Óāį](bg:blue fg:aqua)\
$nodejs$python$rust$golang$php$java\
[Óāį](fg:blue)\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

[palettes.gruvbox_dark]
col_fg     = "#fbf1c7"
col_bg     = "#282828"
col_bg1    = "#3c3836"
col_bg3    = "#665c54"
col_gray   = "#928374"
col_red    = "#cc241d"
col_green  = "#98971a"
col_yellow = "#d79921"
col_blue   = "#458588"
col_aqua   = "#689d6a"
col_orange = "#d65d0e"
fg     = "#fbf1c7"
bg     = "#282828"
bg3    = "#665c54"
gray   = "#928374"
red    = "#cc241d"
green  = "#98971a"
yellow = "#d79921"
blue   = "#458588"
aqua   = "#689d6a"
orange = "#d65d0e"

[username]
show_always = true
format = "[ $user ](bg:bg3 fg:fg bold)"

[hostname]
ssh_only = true
format = "[@$hostname ](bg:bg3 fg:fg bold)"

[directory]
format = "[ ÔĀľ $path ](bg:yellow fg:bg bold)"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "‚Ä¶/"
home_symbol = "~"

[git_branch]
format = "[ ÔĄ¶ $branch ](bg:aqua fg:bg bold)"
symbol = ""

[git_status]
format = "[$all_status$ahead_behind ](bg:aqua fg:bg bold)"
ahead      = "‚á°${count}"
behind     = "‚á£${count}"
diverged   = "‚áē‚á°${ahead_count}‚á£${behind_count}"
untracked  = "?${count}"
stashed    = "*"
modified   = "!${count}"
staged     = "+${count}"
renamed    = "¬Ľ${count}"
deleted    = "‚úė${count}"
conflicted = "="

[nodejs]
format = "[ Óúė $version ](bg:blue fg:fg)"
symbol = ""

[python]
format = "[ ÓąĶ $version ](bg:blue fg:fg)"
symbol = ""

[rust]
format = "[ Óě® $version ](bg:blue fg:fg)"
symbol = ""

[golang]
format = "[ Óėß $version ](bg:blue fg:fg)"
symbol = ""

[php]
format = "[ ÓúĹ $version ](bg:blue fg:fg)"
symbol = ""

[java]
format = "[ ÓČĖ $version ](bg:blue fg:fg)"
symbol = ""

[fill]
symbol = " "

[cmd_duration]
min_time = 2_000
format = "[ ÔČí $duration ](fg:yellow)"

[time]
disabled = false
format = "[ ÔÄó $time ](fg:gray)"
time_format = "%H:%M"

[character]
success_symbol = "[‚ĚĮ](bold green)"
error_symbol   = "[‚ĚĮ](bold red)"
vimcmd_symbol  = "[‚Ěģ](bold green)"

[container]
disabled = true

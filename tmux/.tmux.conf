# =============================================================================
# Tmux Configuration - Catppuccin + Vim Integration
# =============================================================================

# -- General -------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g set-clipboard on
set -g escape-time 0
set -g focus-events on
set -g status-interval 5
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off

# -- Prefix --------------------------------------------------------------------

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# -- Key bindings --------------------------------------------------------------

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Splits (in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation (works with vim-tmux-navigator)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
# OSC 52: works in Docker, WSL2, and any modern terminal (Windows Terminal 1.18+)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel ""

# -- Layouts -------------------------------------------------------------------

# Development layout: nvim (left 65%) + Claude Code (right top) + terminal (right bottom)
bind D split-window -h -p 35 -c "#{pane_current_path}" \; \
  split-window -v -p 50 -c "#{pane_current_path}" \; \
  select-pane -L \; \
  send-keys "nvim" Enter

# Agent layout: 3 equal panes for parallel agents
bind A split-window -h -c "#{pane_current_path}" \; \
  split-window -h -c "#{pane_current_path}" \; \
  select-layout even-horizontal

# -- Plugins -------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

# Catppuccin config
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_status_modules_right "session date_time"
set -g @catppuccin_date_time_text "%H:%M"

# Resurrect + Continuum (session persistence)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
